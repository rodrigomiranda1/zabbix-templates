        - uuid: a7c4de13c9e442b9bb40472e8fae1821
          name: '1.6 - Versao do IPS'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2604.5.1.1.6.0
          key: sophos.ips.version
          delay: 1d
          value_type: TEXT
          trends: '0'
        - uuid: 77fcf91f6e51490bb915b483cd0dd7e6
          name: '5.1.2 - Expiracao Licenca Base'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2604.5.1.5.1.2.0
          key: sophos.lic.base.exp
          delay: 1d
          trends: '0'
          units: unixtime
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var months = {
                      Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5,
                      Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11
                  };
                  
                  // Separa "Feb 26 2029"
                  var parts = value.split(' ');
                  var month = months[parts[0]];
                  var day = parseInt(parts[1]);
                  var year = parseInt(parts[2]);
                  
                  // Cria a data (meia-noite) e retorna o timestamp em segundos
                  var expireDate = new Date(year, month, day);
                  return Math.floor(expireDate.getTime() / 1000);
          triggers:
            - uuid: 98adcf9af4d543d0b333e708cebe98ec
              expression: 'last(/SOPHOS_XG_V22/sophos.lic.base.exp) - now() < 604800'
              recovery_mode: NONE
              name: 'Licença "BASE" vence em MENOS DE 7 dias!'
              priority: HIGH
              manual_close: 'YES'
            - uuid: b968b37af2d04f1b874068f36dc0687c
              expression: 'last(/SOPHOS_XG_V22/sophos.lic.base.exp) - now() < 2592000'
              recovery_mode: NONE
              name: 'Licença "BASE" vence em menos de 30 dias em {HOST.NAME1}'
              priority: WARNING
              manual_close: 'YES'
        - uuid: 14ccba88cb39457381d1576ecaff1108
          name: '5.1.1 -Status Licenca Base'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2604.5.1.5.1.1.0
          key: sophos.lic.base.status
          delay: 1d
          description: |
            1: Unregistered (Não registrado)

zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 0467feab27804fe48a4b61fcfb3cc75e
      name: Sophos
  templates:
    - uuid: 8e587774926c400a9d8b32029fa3777f
      template: SOPHOS_XG_V22
      name: SOPHOS_XG_V22
      description: 'Template feito por Rodrigo Miranda'
      groups:
        - name: Sophos
      items:
        - uuid: 34437e2b5aa445d7ab752f433f3f1090
          name: '1.7 - PING Status'
          type: SIMPLE
          key: icmpping
          delay: 15s
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          valuemap:
            name: 'Sophos IPsec Status'
          triggers:
            - uuid: 58cdf3d89e08470fb7f87f0a0036fa60
              expression: 'max(/SOPHOS_XG_V22/icmpping,#3)=0'
              name: '{HOST.NAME} OFFLINE'
              event_name: 'ICMP {HOST.NAME} sem resposta (3 falhas consecutivas)'
              opdata: 'Status: {ITEM.LASTVALUE}'
              priority: DISASTER
              description: 'O dispositivo não respondeu aos últimos 3 pacotes de ping. Possível queda de energia, falha no link de internet ou firewall travado.'
              tags:
                - tag: Serviço
                  value: Conectividade
        - uuid: bf19e21d89594a09827ea4bcefb4b246
          name: '2.3 - Uso de CPU -  Media'
          type: CALCULATED
          key: sophos.cpu.usage.avg
          value_type: FLOAT
          units: '%'
          params: 'avg(last_foreach(/*/sophos.cpu.usage.[*]))'
          triggers:
            - uuid: 80d0349705124ab78030283e3da0a937
              expression: 'avg(/SOPHOS_XG_V22/sophos.cpu.usage.avg,5m)>90'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/SOPHOS_XG_V22/sophos.cpu.usage.avg,5m)<70'
              name: 'Uso de CPU elevado em {HOST.NAME} (Acima de 90%)'
              event_name: 'CPU de {HOST.NAME} em {ITEM.LASTVALUE}%'
              opdata: 'Carga atual: {ITEM.LASTVALUE}'
              priority: HIGH
              tags:
                - tag: Serviço
                  value: Performance
        - uuid: 72f1264e65aa4f598b1006233dd8a7de
          name: '2.1 - Data do dispositivo'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2604.5.1.2.1.0
          key: sophos.currentdate
          trends: '0'
          units: unixtime
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - 'return Math.round(Date.parse(value) / 1000);'
          triggers:
            - uuid: cf0b4a33bc8f47ca93d69eac48b2af8b
              expression: 'fuzzytime(/SOPHOS_XG_V22/sophos.currentdate, 60)=0'
              name: 'Relógio de {HOST.NAME} desatualizado'
              event_name: 'Relógio de {HOST.NAME} fora de sincronia (>1 min)'
              priority: WARNING
              manual_close: 'YES'
              tags:
                - tag: Serviço
                  value: Sistema
        - uuid: c4ed43b4054a47d18a27165150eba4cb
          name: '2.4.1 - Capacidade Total do Disco'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2604.5.1.2.4.1.0
          key: sophos.disk.capacity
          delay: 1d
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1048576'
        - uuid: 639c75ea49b04420a3de274c2d9ba341
          name: '2.4.2 - Uso do Disco'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2604.5.1.2.4.2.0
          key: sophos.disk.usage
          units: '%'
          triggers:
            - uuid: 3c92f450ea2a429ca8a36262cc86b9b3
              expression: last(/SOPHOS_XG_V22/sophos.disk.usage)>90
              name: 'Uso de disco elevado em {HOST.NAME} (Acima de 90%)'
              event_name: 'Disco de {HOST.NAME} quase cheio ({ITEM.LASTVALUE}%)'
              opdata: 'Espaço ocupado: {ITEM.LASTVALUE}%'
              priority: HIGH
              tags:
                - tag: Serviço
                  value: Performance
        - uuid: fbc05b5a231e4ce0bb1199dca13844bd
          name: '1.3 - Versao da Firmware'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2604.5.1.1.3.0
          key: sophos.firmware
          delay: 12h
          value_type: TEXT
          trends: '0'
          inventory_link: OS_FULL
          triggers:
            - uuid: e21f6b8012cf4d1180b001a97396f29f
              expression: change(/SOPHOS_XG_V22/sophos.firmware)<>0
              name: 'Firmware de {HOST.NAME} foi alterada'
              event_name: 'A versão do firmware mudou para {ITEM.LASTVALUE}'
              priority: INFO
              description: 'Este gatilho avisa quando há atualização de firmware no Sophos. Verifique se foi uma mudança agendada pela TI.'
              manual_close: 'YES'
              tags:
                - tag: Serviço
                  value: Auditoria
        - uuid: 4335152e3d5644d8a834d40d5bd36a9a
          name: '4.1 - Status do HA'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2604.5.1.4.1.0
          key: sophos.ha.status
          valuemap:
            name: 'Sophos HA Service'
          triggers:
            - uuid: 9fc558f0176244d8b1d1071a415069a7
              expression: last(/SOPHOS_XG_V22/sophos.ha.status)=6
              name: 'Falha na Alta Disponibilidade (HA) em {HOST.NAME}'
              event_name: 'HA do Sophos em estado de FALHA (Erro Crítico)'
              priority: DISASTER
              tags:
                - tag: Serviço
                  value: Disponibilidade
        - uuid: 97ee98bd249243578ff9fe376fbebca0

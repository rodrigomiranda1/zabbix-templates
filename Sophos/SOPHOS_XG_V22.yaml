          key: sophos.cpu.discovery
          delay: 1h
          item_prototypes:
            - uuid: 192d1f1c3f2541f3bf3c981c9a49e2a6
              name: '2.3.{#CORE_NUM} - Uso do CPU - {#CORE_NUM}º Core'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.25.3.3.1.2.{#SNMPINDEX}'
              key: 'sophos.cpu.usage.[{#SNMPINDEX}]'
              units: '%'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var output = JSON.parse(value);
                  
                  for (var i = 0; i < output.length; i++) {
                      // Essa linha cria a macro que o nome do item vai usar
                      output[i]["{#CORE_NUM}"] = (i + 1).toString();
                  }
                  
                  return JSON.stringify(output);

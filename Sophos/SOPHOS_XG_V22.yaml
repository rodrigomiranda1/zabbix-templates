              key: 'sophos.interface.util[{#SNMPINDEX}]'
              delay: 30s
              value_type: FLOAT
              trends: '0'
              units: '%'
              params: '100 * (last(//sophos.interface.in[{#SNMPINDEX}]) + last(//sophos.interface.out[{#SNMPINDEX}])) / max(last(//sophos.interface.speed[{#SNMPINDEX}]), 1)'
